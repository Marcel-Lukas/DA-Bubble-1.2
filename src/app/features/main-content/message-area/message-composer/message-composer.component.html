@defer (when isEmojiPickerOpen) {
  @if (isEmojiPickerOpen) {
    <emoji-mart #emojiPicker [darkMode]="false" (emojiClick)="addEmoji($event)"></emoji-mart>
  }
}

@if (displaySuggestions) {
<div class="suggestions">
  @for(user of foundUsers; track user.uId) {
  <div (click)="insertUserSuggestion(user)">
    <div class="user-img-status">
      <img src="{{ user?.uUserImage }}" appImageFallback alt="" />
      <span [ngClass]="(user | online) ? 'online' : 'offline'"></span>
    </div>
    <span>{{ user?.uName }}</span>
  </div>
  } @for(channel of foundChannels; track channel.cId) {
  <div (click)="insertChannelSuggestion(channel)">#{{ channel?.cName }}</div>
  }
</div>
}

@if (isRateLimited) {
<div class="rate-limit-hint">
  <span class="material-symbols icon-schedule"></span>
  <span class="hint">Spamschutz – du sendest zu schnell</span>
</div>
}

<textarea
  type="text"
  [placeholder]="getPlaceholder()"
  [(ngModel)]="newMessageText"
  [class.rate-limited]="isRateLimited"
  #messageInput
  (input)="onTextChange($event)"
  (keydown)="handleKeyDown($event)"
  rows="2"
></textarea>

<div class="textfield-buttons">
  <div>
    <button class="icon-button blue-hover" (click)="toggleEmojiPicker($event)">
      <div class="material-symbols icon-sentiment_satisfied textfield-icon"></div>
    </button>

    <button class="icon-button blue-hover" (click)="openUserSuggestions()">
      <div class="material-symbols icon-alternate_email textfield-icon"></div>
    </button>

    <button class="format-button" title="Fett" (mousedown)="applyFormat('b', $event)">
      <span class="format-bold">F</span>
    </button>

    <button class="format-button" title="Kursiv" (mousedown)="applyFormat('i', $event)">
      <span class="format-italic">K</span>
    </button>

    <button class="format-button" title="Unterstrichen" (mousedown)="applyFormat('u', $event)">
      <span class="format-underline">U</span>
    </button>
  </div>

  <button class="icon-button" [disabled]="!hasSendableText">
    <div class="material-symbols icon-send send-icon" (click)="sendMessage()"></div>
  </button>
</div>
