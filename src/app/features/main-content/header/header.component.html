<header class="nunitoFont">

  @if (messageIn) {
    <div class="messageInWorkspace">
      <button (click)="toggleMessageInView()">
        <div class="material-symbols icon-keyboard_arrow_left arrowLeft"></div>
        <img src="assets/img/workspaceLogo.png" />
      </button>
      <h1>Devespace</h1>
    </div>
  } @else {
    <div class="logo">
      <img src="assets/img/logo.png" (click)="reloadPage()"/>
      <span>DA-Bubble</span>
    </div>
  }
  
  <app-device-visible mode="desktopBig">
    <app-search-bar
      (openChat)="openChat.emit($event)"
      (openThread)="openThread.emit($event)"
      >></app-search-bar>
  </app-device-visible>

  <app-user-name
    [activeUserId]="activeUserId"
    (openChat)="openChat.emit($event)"
  ></app-user-name>

</header>
