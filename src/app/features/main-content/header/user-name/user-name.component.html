<main>
  <div class="avatar">
    <span class="avatarNameText">{{ userName }}</span>
    <div class="userStatus">
      <app-device-visible mode="tabletBig">
          <img #tabletToggleBtn (click)="toggleImage()" [src]="userImage" appImageFallback alt="Eigenes Profilbild" />
      </app-device-visible>
      <app-device-visible mode="desktopBig">
        <img class="normalImage" (click)="toggleImage()" [src]="userImage" appImageFallback alt="Eigenes Profilbild" />
        <span class="normalImagePoint" [ngClass]="(presenceUser | online) ? 'online' : 'offline'"></span>
      </app-device-visible>
    </div>
  </div>
  <button class="openLogOut" (click)="toggleLogOut()"  #arrowToggleBtn>
    <div class="arrowDownHeight material-symbols icon-keyboard_arrow_down arrowDown"></div>
  </button>
</main>
@if (isLogOutVisible) {
  <section>
    <div class="popUpStyle"  [ngClass]="{ 'slide-down': animateOut }">
      <app-device-visible mode="tabletBig">
          <div class="popUpXLine"></div>
      </app-device-visible>
      <div class="logOut" #logOutBox>
        <button (click)="openProfil()">
          <div class=" material-symbols icon-account_circle"></div>
          <span>Profil</span>
        </button>
        <button (click)="toggelFullscreen()">
          <div class=" material-symbols icon-crop_free"></div>
          <span>Vollbild</span>
        </button>
        <button (click)="logOut()">
          <div class=" material-symbols icon-logout"></div>
          <span>Log out</span>
        </button>
      </div>
    </div>
  </section>
}
<div #profilWrapper>
  @if (showProfil) {
    <app-profil
    [activeUserId]="activeUserId"
    [userImage]="userImage"
    [userName]="userName"
    [userEmail]="userEmail"
    [userStatus]="userStatus"
    [userLastSeen]="userLastSeen"
    [userId]="userId"
    #profilRef
    (close)="onProfilClose()"
    (openChat)="openChat.emit($event)" 
    size="small"
    [showButton]="false"
  ></app-profil>
  }
</div>
