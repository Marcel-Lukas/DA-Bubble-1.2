<header>
    <section>
        <img src="assets/img/workspaceLogo.png">
        <h1>Devspace</h1>
        <button class="squareImage">
            <div class="material-symbols icon-edit_square icon" (click)="openNewChat()"></div>
        </button>
    </section>

    <app-device-visible mode="tabletBig">
        <button (click)="openNewChat(); someAction()" class="squareImageNewPosition">
            <div class="material-symbols icon-edit_square icon"></div>
        </button>
    </app-device-visible>
</header>
