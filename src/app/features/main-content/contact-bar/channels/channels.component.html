<main>
  <header>
    <button class="channelHeadShow" (click)="showAllChannels()">
      <button class="showChannels">
        @if (!showChannels) {
        <div class="material-symbols icon-arrow_drop_down showChannelsIcon"></div>
        } @else {
        <div class="material-symbols icon-arrow_right showChannelsIcon"></div>
        }
      </button>
      <div class="workSpaceText">
        <div class="material-symbols icon-sort workSpaceIcon"></div>
        <h2>Channels</h2>
      </div>
    </button>
  </header>
  @if (!showChannels) {
  <section>
    <div class="newChannels">
      @for (channel of channels$ | async; track channel.id) {
      <button
        (click)="selectChannel(channel.id); someAction()"
        class="everyChannel"
        [class.hasUnread]="unreadChannels.has(channel.id)"
      >
        <div class="tagName">
          <div class="tagImage">
            <div class="material-symbols icon-tag hashtagIcon"></div>
          </div>
          <span>{{ channel.name }}</span>
          @if (unreadChannels.has(channel.id)) {
          <span class="unreadDot unreadDotChannel" aria-label="Neue Nachricht"></span>
          }
        </div>
        @if (channel.name != 'Willkommen' && channel.createdBy === activeUserId) {
        <button
          class="deleteChannel"
          (click)="onDeleteClick(channel.id, $event)"
        >
          <div class="material-symbols icon-delete closeIcon"></div>
        </button>
        }
      </button>
      }
    </div>
    <button class="addChannel" (click)="toggleAddChannel()">
      <div class="material-symbols icon-add_circle addIconChannel"></div>
      <span>Channel hinzufügen</span>
    </button>
  </section>
  } @if (showAddChannel) {
  <app-add-channel
    [activeUserId]="activeUserId"
    (close)="toggleAddChannel()"
  ></app-add-channel>
  }
</main>

@if (isPermanentDeleteOpen && openChannelId) {
<app-permanent-delete
  [target]="'channel'"
  [id]="openChannelId"
  [requestingUserId]="activeUserId"
  (close)="isPermanentDeleteOpen = false"
></app-permanent-delete>
}
